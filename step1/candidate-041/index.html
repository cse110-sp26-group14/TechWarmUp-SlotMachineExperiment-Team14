<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Themed Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="slot-machine">
        <h1>AI Funhouse Slot Machine</h1>
        <div class="info">
            <p>Tokens: <span id="token-count">100</span></p>
        </div>
        <div id="reels">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>
        <button id="spin-button">Spin (1 Token)</button>
        <p id="message"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
