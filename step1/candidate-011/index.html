<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="machine">
        <h1>AI Token Slot Machine</h1>
        <p class="description">Spin the reels to train your model! Will you achieve AGI or just burn through your tokens?</p>
        <div class="reels">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>
        <div class="controls">
            <button id="spin-button">Spin (10 Tokens)</button>
        </div>
        <div class="info">
            <p>Tokens: <span id="token-balance">100</span></p>
            <p id="message">Press the spin button to start!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
