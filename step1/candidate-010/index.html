<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="slot-machine">
        <h1>AI Slot Machine</h1>
        <div class="reels">
            <div class="reel" id="reel1"></div>
            <div class="reel" id="reel2"></div>
            <div class="reel" id="reel3"></div>
        </div>
        <button id="spin-button">Spin (1 Token)</button>
        <div class="info">
            <p>Tokens: <span id="tokens">100</span></p>
            <p id="message">Welcome to the AI Slot Machine! Spin to win!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
