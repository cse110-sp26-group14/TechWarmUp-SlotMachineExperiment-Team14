<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI Token Slot Machine</h1>
        <div class="token-display">
            <h2>Tokens: <span id="tokens">100</span></h2>
        </div>
        <div class="slot-machine">
            <div class="reel" id="reel1"></div>
            <div class="reel" id="reel2"></div>
            <div class="reel" id="reel3"></div>
        </div>
        <button id="spinButton">Spin the AI Algorithm!</button>
        <div class="message-display">
            <p id="message"></p>
        </div>
        <button id="resetButton" style="display: none;">Reset Game</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
