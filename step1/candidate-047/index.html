<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header id="header">
            <h1>AI Token Slot Machine</h1>
            <p>Tokens: <span id="token-count">100</span></p>
        </header>

        <section id="slot-machine">
            <div class="reel">
                <div class="symbol" data-symbol=""></div>
            </div>
            <div class="reel">
                <div class="symbol" data-symbol=""></div>
            </div>
            <div class="reel">
                <div class="symbol" data-symbol=""></div>
            </div>
        </section>

        <section id="controls">
            <button id="spin-button">Spin</button>
        </section>

        <section id="message-display">
            <!-- Game messages will appear here -->
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
