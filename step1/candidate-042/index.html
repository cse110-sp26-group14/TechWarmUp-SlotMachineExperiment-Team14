<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Buzzword Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>AI Buzzword Slot Machine</h1>
        <div class="slot-machine">
            <div class="reels">
                <div class="reel"></div>
                <div class="reel"></div>
                <div class="reel"></div>
            </div>
            <div class="info">
                <p>Tokens: <span id="token-count">100</span></p>
                <p id="message"></p>
            </div>
            <button id="spin-button">Spin (10 Tokens)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
