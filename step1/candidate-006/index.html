<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>AI Funhouse Slot Machine</h1>
        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel1"></div>
                <div class="reel" id="reel2"></div>
                <div class="reel" id="reel3"></div>
            </div>
            <button id="spin-button">Spin (10 Tokens)</button>
            <p>Tokens: <span id="token-balance">100</span></p>
            <p id="message-area">Welcome! Spin to win!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
