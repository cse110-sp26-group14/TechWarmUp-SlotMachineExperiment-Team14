<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>AI Slot Machine</h1>

    <div class="machine">
        <div class="reels">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>

        <div class="controls">
            <button id="spin-button">Spin</button>
        </div>

        <div class="balance">
            <p>Tokens: <span id="balance-amount">100</span></p>
        </div>
        
        <div class="message">
            <p id="message-text">Press Spin to start!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
