<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="machine-container">
        <h1>AI Token Slot Machine</h1>
        <p class="sub-heading">Spin to "Generate" More Tokens!</p>

        <div class="token-display">
            <p>Your Tokens: <span id="token-count">100</span></p>
        </div>

        <div class="slot-machine">
            <div class="reel" id="reel1">🤖</div>
            <div class="reel" id="reel2">🧠</div>
            <div class="reel" id="reel3">💡</div>
        </div>

        <button id="spin-button">Spin (Cost: 5 Tokens)</button>

        <p id="message"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
