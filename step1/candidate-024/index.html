<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Grinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="machine">
        <header>
            <h1>AGI Simulator 9000</h1>
            <div class="token-display">
                <span>Compute Tokens:</span>
                <span id="token-count">100</span>
            </div>
        </header>
        <main>
            <div class="reels">
                <div class="reel"></div>
                <div class="reel"></div>
                <div class="reel"></div>
            </div>
            <div id="message-box" class="message">Spin to train the model!</div>
        </main>
        <footer>
            <button id="spin-button" class="spin-button">
                Train Model (Cost: 10)
            </button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
