<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slot-machine">
        <h1>AI Token Slot Machine</h1>
        <div class="display-area">
            <p>AI Tokens: <span id="tokens">100</span></p>
            <p>Bet: <span id="bet-amount">10</span></p>
        </div>
        <div class="reels">
            <div class="reel" id="reel1"></div>
            <div class="reel" id="reel2"></div>
            <div class="reel" id="reel3"></div>
        </div>
        <div class="controls">
            <button id="spin-button">Spin</button>
            <button id="bet-decrease">-</button>
            <button id="bet-increase">+</button>
        </div>
        <p class="message" id="game-message">Ready to challenge the AI?</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
