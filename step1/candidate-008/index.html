<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Satire Slot Machine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="slot-machine">
        <h1>AI Token Slot Machine</h1>
        <p class="subtitle">Will you achieve Artificial General Intelligence or just burn through your tokens?</p>
        <div id="reels">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>
        <div id="controls">
            <button id="spinButton">Spin (Cost: 5 Tokens)</button>
        </div>
        <div id="wallet">
            <p>Your Tokens: <span id="token-balance">100</span></p>
        </div>
        <div id="message-display">
            <p id="message">Welcome! Spend your tokens wisely.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
