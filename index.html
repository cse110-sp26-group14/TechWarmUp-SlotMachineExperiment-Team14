<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fun Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slot-machine-container">
        <h1>AI Fun Slot Machine</h1>

        <div class="token-display">
            Tokens: <span id="tokens">100</span>
        </div>

        <div class="reels">
            <div class="reel" id="reel1">🧠</div>
            <div class="reel" id="reel2">🤖</div>
            <div class="reel" id="reel3">💬</div>
        </div>

        <div class="controls">
            <button id="spinButton">Spin for 10 Tokens!</button>
        </div>

        <div class="message-display">
            <p id="message">Press 'Spin' to begin your AI adventure!</p>
        </div>

        <div class="ai-fun-flavor">
            <p>Win big and train your model to generate more tokens!</p>
            <p>Disclaimer: No actual AI models were harmed in the making of this slot machine. Maybe.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
