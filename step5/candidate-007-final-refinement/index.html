<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Slot Machine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>AI Token Slot Machine</h1>
    <div class="slot-machine">
        <div class="reels">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>
        <div class="controls">
            <div class="bet-control">
                <button id="decreaseBet">−</button>
                <span class="bet-amount">Bet: <span id="betAmount">10</span></span>
                <button id="increaseBet">+</button>
            </div>
            <button id="spinButton">Spin</button>
            <button id="resetButton" style="display: none;">Play Again</button>
        </div>
        <div class="stats">
            <p>Tokens: <span id="tokenCount">1000</span></p>
            <p>Last Win: <span id="winAmount">0</span></p>
        </div>
        <p class="message" id="message-log"></p>
        <p class="comical-line" id="comical-line"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
